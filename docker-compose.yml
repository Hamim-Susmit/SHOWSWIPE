version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: showswipe
      POSTGRES_PASSWORD: showswipe
      POSTGRES_DB: showswipe
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis]
    volumes: [./backend:/app]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes: [./frontend:/app]
    ports: ["5173:5173"]
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pgdata:
